<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    
    <link rel="stylesheet" href="estilos/mobile.css" media="all">
    <link rel="stylesheet" href="estilos/medias.css">

</head>
<body> 
    <main>
        <section>
            <div id="imagem">
            </div>
            <div id="login">
                <h1>Login</h1>
                <p>Seja bem-vindo(a) novamente. Faça login para acessar sua conta e poder fazer as configurações no seu ambiente.</p>
                <form action="login.php" method="post" autocomplete="on">
                    <div class="campo">
                        <span class="material-symbols-outlined" id="pessoa">person
                        </span>
                        <input type="email" name="email" id="email" required placeholder=" seu e-mail" autocomplete="email">
                    </div>
                    <div class="campo">
                        <span class="material-symbols-outlined" id="chave">vpn_key</span>
                        <input type="password" name="senha" id="senha" required placeholder=" sua senha" minlength="8" autocomplete="current-password">
                    </div>
                    
                    <input id="entrar" type="submit" value="Entrar">
                
                    <a id="esqueci" href="login.php">
                        Esqueci a senha 
                        <span id="mail" class="material-symbols-outlined">mail</span>
                    </a>
                    
                </form>
            </div>
        </section>
    </main>
</body>
</html>
